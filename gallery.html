<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b1020" />
    <title>Birthday Journey — Gallery</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body data-page="gallery">
    <div class="cursor" id="cursor" aria-hidden="true"></div>
    <div class="cursorTrail" id="cursorTrail" aria-hidden="true"></div>
    <div class="emojiLayer" id="emojiLayer" aria-hidden="true"></div>
    <canvas class="bgCanvas" id="bgCanvas" aria-hidden="true"></canvas>

    <div class="musicDock">
      <button class="musicBtn hoverExpand" id="musicBtn" aria-label="Toggle music">
        <span class="musicIcon" aria-hidden="true"><i class="fa-solid fa-music"></i></span>
        <span class="musicLabel" id="musicLabel">Play</span>
        <span class="eq" id="eq" aria-hidden="true">
          <span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span>
        </span>
      </button>
    </div>
    <audio
      id="bgMusic"
      preload="none"
      loop
      crossorigin="anonymous"
      src="https://cdn.pixabay.com/download/audio/2022/10/25/audio_946b5f8bb0.mp3?filename=lofi-study-112191.mp3"
    ></audio>

    <main>
      <section class="section gallerySection pageTopPad">
        <div class="container">
          <header class="sectionHeader">
            <h2>Photo Gallery</h2>
            <p>Step 3 of 5 — swipe through proof we’re unstoppable (and unserious).</p>
          </header>

          <!-- Rebuilt slider (required structure) -->
          <div class="slider gallerySlider glass" id="gallerySlider" aria-label="Photo slider">
            <div class="slides" id="gallerySlides">
              <!-- Replace these placeholders with real images anytime -->
              <img
                src="https://picsum.photos/seed/bday1/1400/900"
                alt="Memory 1"
                loading="lazy"
              />
              <img
                src="https://picsum.photos/seed/bday2/1400/900"
                alt="Memory 2"
                loading="lazy"
              />
              <img
                src="https://picsum.photos/seed/bday3/1400/900"
                alt="Memory 3"
                loading="lazy"
              />
              <img
                src="https://picsum.photos/seed/bday4/1400/900"
                alt="Memory 4"
                loading="lazy"
              />
              <img
                src="https://picsum.photos/seed/bday5/1400/900"
                alt="Memory 5"
                loading="lazy"
              />
            </div>

            <button class="prev hoverExpand" id="galleryPrev" aria-label="Previous">❮</button>
            <button class="next hoverExpand" id="galleryNext" aria-label="Next">❯</button>
          </div>

          <div class="pageNavRow">
            <button class="btn ghost hoverExpand" data-nav="timeline.html">Back</button>
            <button class="btn primary hoverExpand" data-nav="surprise.html">
              Continue <span aria-hidden="true">👉</span>
              <span class="btnGlow" aria-hidden="true"></span>
            </button>
          </div>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
